<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - Lookalike</title>
    <!-- [성능] CDN 도메인 preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .login-icon-box {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px rgba(26, 26, 46, 0.2);
        }
        
        .login-title {
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        
        .form-control-lg {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            text-align: center;
            font-size: 1rem;
            padding: 14px 20px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .form-control-lg:focus {
            border-color: #1a1a2e;
            box-shadow: 0 0 0 0.25rem rgba(26, 26, 46, 0.1);
        }
        
        #adminPassword {
            letter-spacing: 4px;
        }
        
        .btn-login {
            border-radius: 12px;
            font-weight: 600;
            padding: 14px 20px;
            background-color: #1a1a2e;
            border-color: #1a1a2e;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            background-color: #0f1322;
            border-color: #0f1322;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.2);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-icon-box">
                <i class="fas fa-shield-alt text-white fs-3"></i>
            </div>
            <h4 class="login-title">관리자 시큐어 로그인</h4>
            <p class="text-muted" style="font-size:0.9rem">권한 있는 관리자만 접근할 수 있습니다</p>
        </div>
        
        <form onsubmit="adminLogin(event)">
            <div class="mb-4">
                <input type="text" id="adminUsername" class="form-control form-control-lg"
                    placeholder="관리자 아이디" autocomplete="username" required>
                <input type="password" id="adminPassword" class="form-control form-control-lg"
                    placeholder="관리자 비밀번호" autocomplete="current-password" required>
            </div>
            
            <div id="adminAuthError" style="display:none;" class="alert alert-danger py-2 px-3 mb-4 rounded-3 d-flex align-items-center" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="adminAuthErrorMsg" style="font-size: 0.9rem;"></span>
            </div>
            
            <button type="submit" id="adminLoginBtn" class="btn btn-dark btn-login w-100">
                <span class="btn-text"><i class="fas fa-unlock me-2"></i>보안 접속</span>
                <span class="spinner-border spinner-border-sm d-none" id="adminLoginSpinner"></span>
            </button>
        </form>
        
        <div class="text-center">
            <a href="/" class="back-link"><i class="fas fa-arrow-left me-1"></i> 메인 서비스로 돌아가기</a>
        </div>
    </div>

    <script>
        async function adminLogin(e) {
            e.preventDefault();

            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            if (!username || !password) return;

            const btn = document.getElementById('adminLoginBtn');
            const spinner = document.getElementById('adminLoginSpinner');
            const btnText = btn.querySelector('.btn-text');
            const errorEl = document.getElementById('adminAuthError');

            btn.disabled = true;
            spinner.classList.remove('d-none');
            btnText.classList.add('d-none');
            errorEl.style.display = 'none';

            try {
                const resp = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password }),
                });

                if (resp.ok) {
                    // 인증 성공 후 인프라 대시보드로 이동
                    location.href = '/admin/infra';
                } else {
                    const err = await resp.json();
                    document.getElementById('adminAuthErrorMsg').textContent =
                        err.detail || '인증에 실패했습니다.';
                    errorEl.style.display = 'flex';
                    document.getElementById('adminPassword').value = '';
                    document.getElementById('adminPassword').focus();
                }
            } catch (e) {
                document.getElementById('adminAuthErrorMsg').textContent = '서버 연결에 실패했습니다.';
                errorEl.style.display = 'flex';
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
                btnText.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
