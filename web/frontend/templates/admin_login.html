<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - Lookalike</title>
    <!-- [성능] CDN 도메인 preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/admin_style.css" rel="stylesheet">
    <script src="/static/js/admin_common.js" defer></script>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-icon-box">
                <i class="fas fa-shield-alt text-white fs-3"></i>
            </div>
            <h4 class="login-title">관리자 시큐어 로그인</h4>
            <p class="text-muted" style="font-size:0.9rem">권한 있는 관리자만 접근할 수 있습니다</p>
        </div>

        <form onsubmit="adminLogin(event)">
            <div class="mb-4">
                <input type="text" id="adminUsername" class="form-control form-control-lg" placeholder="관리자 아이디"
                    autocomplete="username" required>
                <input type="password" id="adminPassword" class="form-control form-control-lg" placeholder="관리자 비밀번호"
                    autocomplete="current-password" required>
            </div>

            <div id="adminAuthError" style="display:none;"
                class="alert alert-danger py-2 px-3 mb-4 rounded-3 d-flex align-items-center" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span id="adminAuthErrorMsg" style="font-size: 0.9rem;"></span>
            </div>

            <button type="submit" id="adminLoginBtn" class="btn btn-dark btn-login w-100">
                <span class="btn-text"><i class="fas fa-unlock me-2"></i>보안 접속</span>
                <span class="spinner-border spinner-border-sm d-none" id="adminLoginSpinner"></span>
            </button>
        </form>

        <div class="text-center">
            <a href="/" class="back-link"><i class="fas fa-arrow-left me-1"></i> 메인 서비스로 돌아가기</a>
        </div>
    </div>

</body>

</html>
