name: Server 배포

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-gcp:
    name: GCP Compute Engine 배포
    runs-on: ubuntu-latest

    steps:
    - name: 변경 파일 목록 확인
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # 이전 커밋과 비교하기 위해 2개 가져옴

    - name: Dockerfile/requirements 변경 여부 감지
      id: detect
      run: |
        CHANGED=$(git diff --name-only HEAD~1 HEAD)
        echo "변경된 파일:"
        echo "$CHANGED"
        if echo "$CHANGED" | grep -qE "^Dockerfile|requirements.*\.txt$"; then
          echo "needs_build=true" >> $GITHUB_OUTPUT
          echo "→ 빌드 필요 (Dockerfile 또는 requirements 변경됨)"
        else
          echo "needs_build=false" >> $GITHUB_OUTPUT
          echo "→ 빌드 불필요 (코드/설정 변경만)"
        fi

    - name: GCP 접속 및 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_HOST }}
        username: ${{ secrets.GCP_USER }}
        key: ${{ secrets.GCP_SSH_KEY }}
        port: 22
        script: |
          cd /opt/main-project-lookalike

          # 1. 최신 코드 동기화
          sudo git fetch origin main
          sudo git reset --hard origin/main

          # 2. 권한 유지
          sudo chown -R root:lookalike-devs .
          sudo chmod -R 2775 .

          # 3. 조건부 빌드 + 무중단 재시작
          # Dockerfile/requirements 변경 시만 빌드, 그 외엔 up -d 만으로 반영
          if [ "${{ steps.detect.outputs.needs_build }}" = "true" ]; then
            echo "=== Dockerfile/requirements 변경 감지: 빌드 후 재시작 ==="
            docker compose build --parallel
            docker compose up -d
          else
            echo "=== 코드 변경만: 빌드 없이 컨테이너 재시작 (볼륨 마운트 자동 반영) ==="
            docker compose up -d --no-build
          fi

